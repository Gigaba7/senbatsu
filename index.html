<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="アークナイツ ランダムX人縛り用オペレーター管理シート" />
    <title>ランダムX人 オペレーターシート</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <header class="site-header">
        <div>
          <p class="eyebrow">ARKNIGHTS / RANDOM OPERATOR SHEET</p>
          <h1>ランダムX人 オペレーターシート</h1>
          <p class="lead">選出したオペレーターをクリックして、使用状況を記録できます。</p>
        </div>
        <div class="announcement">
          <button
            id="announcement-button"
            class="announcement-button"
            type="button"
            aria-expanded="false"
            aria-controls="announcement-panel"
            title="お知らせ"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 6.5A2.5 2.5 0 0 1 6.5 4h11A2.5 2.5 0 0 1 20 6.5v7a2.5 2.5 0 0 1-2.5 2.5H11l-4.2 3.15A.75.75 0 0 1 5.5 18.5V16H6.5A2.5 2.5 0 0 1 4 13.5v-7Z" />
            </svg>
            <span class="visually-hidden">お知らせ</span>
          </button>
          <div id="announcement-panel" class="announcement-panel" role="region" aria-label="お知らせ" hidden></div>
        </div>
      </header>

      <section class="controls" aria-label="抽選設定">
        <label for="operator-count">
          抽選人数
          <span class="input-wrap">
            <input id="operator-count" type="number" min="1" step="1" value="50" inputmode="numeric" />
            <span>人</span>
          </span>
        </label>
        <label for="seed-input">
          シード入力
          <span class="input-wrap">
            <input id="seed-input" class="seed-import-input" type="text" autocomplete="off" spellcheck="false" />
          </span>
        </label>
        <button id="generate-button" class="button button-primary" type="button">
          <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="m16 3 4 4-4 4M4 7h15M8 21l-4-4 4-4M20 17H5" />
          </svg>
          生成する
        </button>
        <button id="reset-button" class="button button-secondary button-icon-only" type="button" aria-label="使用状況をリセット" title="使用状況をリセット">
          <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20 11a8 8 0 1 0 2 5.5M20 4v7h-7" />
          </svg>
        </button>
        <button id="options-button" class="options-button" type="button" aria-label="抽選条件を設定" title="抽選条件を設定">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="3" />
            <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06-2.12 2.12-.06-.06a1.7 1.7 0 0 0-1.88-.34 1.7 1.7 0 0 0-1.03 1.56V20h-3v-.08a1.7 1.7 0 0 0-1.03-1.56 1.7 1.7 0 0 0-1.88.34l-.06.06-2.12-2.12.06-.06A1.7 1.7 0 0 0 7 14.7a1.7 1.7 0 0 0-1.56-1.03h-.08v-3h.08A1.7 1.7 0 0 0 7 9.64a1.7 1.7 0 0 0-.34-1.88L6.6 7.7l2.12-2.12.06.06a1.7 1.7 0 0 0 1.88.34 1.7 1.7 0 0 0 1.03-1.56V4.3h3v.08a1.7 1.7 0 0 0 1.03 1.56 1.7 1.7 0 0 0 1.88-.34l.06-.06 2.12 2.12-.06.06a1.7 1.7 0 0 0-.34 1.88 1.7 1.7 0 0 0 1.56 1.03h.08v3h-.08A1.7 1.7 0 0 0 19.4 15Z" />
          </svg>
        </button>
      </section>

      <section class="sheet" aria-labelledby="result-title">
        <div class="sheet-header">
          <div>
            <p class="section-label">RESULT</p>
            <h2 id="result-title">抽選結果</h2>
          </div>
          <div class="result-meta">
            <label class="seed-field" for="seed-display">
              <span>SEED</span>
              <input id="seed-display" class="seed-display" type="text" readonly />
              <button id="copy-seed-button" class="copy-seed-button" type="button" aria-label="シード値をコピー" title="シード値をコピー">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M8 8h10v12H8zM6 16H5a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v1" />
                </svg>
              </button>
            </label>
            <p id="progress" class="progress" aria-live="polite">まだ生成されていません</p>
          </div>
        </div>
        <p id="notice" class="notice" role="status" aria-live="polite"></p>
        <div id="operator-list" class="operator-list" aria-live="polite">
          <p class="empty-state">抽選人数を入力して「生成する」を押してください。</p>
        </div>
      </section>
    </main>

    <p class="unofficial-note">非公式ファンツールです。Hypergryph / Yostar とは無関係です。</p>

    <dialog id="options-dialog" class="options-dialog">
      <form method="dialog">
        <div class="dialog-header">
          <div>
            <p class="section-label">OPTIONS</p>
            <h2>抽選条件</h2>
          </div>
          <button class="dialog-close" value="cancel" aria-label="閉じる" title="閉じる">×</button>
        </div>

        <fieldset class="option-group">
          <legend>選出対象レアリティ</legend>
          <div class="rarity-toggles">
            <label><input type="checkbox" data-rarity-toggle="6" checked />☆6</label>
            <label><input type="checkbox" data-rarity-toggle="5" checked />☆5</label>
            <label><input type="checkbox" data-rarity-toggle="4" checked />☆4</label>
            <label><input type="checkbox" data-rarity-toggle="3" checked />☆3</label>
            <label><input type="checkbox" data-rarity-toggle="2" checked />☆2</label>
            <label><input type="checkbox" data-rarity-toggle="1" checked />☆1</label>
          </div>
        </fieldset>

        <fieldset class="option-group">
          <legend>選出対象職分</legend>
          <div class="class-toggles" id="class-toggles"></div>
        </fieldset>

        <fieldset class="option-group">
          <legend>レアリティごとの最低人数</legend>
          <div class="minimum-grid">
            <label>☆6<input type="number" min="0" step="1" value="0" data-rarity-minimum="6" /></label>
            <label>☆5<input type="number" min="0" step="1" value="0" data-rarity-minimum="5" /></label>
            <label>☆4<input type="number" min="0" step="1" value="0" data-rarity-minimum="4" /></label>
            <label>☆3<input type="number" min="0" step="1" value="0" data-rarity-minimum="3" /></label>
            <label>☆2<input type="number" min="0" step="1" value="0" data-rarity-minimum="2" /></label>
            <label>☆1<input type="number" min="0" step="1" value="0" data-rarity-minimum="1" /></label>
          </div>
        </fieldset>

        <p id="options-notice" class="options-notice" role="status"></p>
        <div class="dialog-actions">
          <button id="clear-options-button" class="button button-secondary" type="button">条件を初期化</button>
          <button id="save-options-button" class="button button-primary" type="submit">保存</button>
        </div>
      </form>
    </dialog>

    <template id="operator-template">
      <button class="operator-card" type="button">
        <img class="operator-image" alt="" hidden />
        <span class="operator-name"></span>
        <span class="operator-meta">
          <span class="operator-class"></span>
          <span class="operator-rarity" aria-label=""></span>
        </span>
      </button>
    </template>

    <script src="operators.js"></script>
    <script src="announcements.js"></script>
    <script src="app.js"></script>
  </body>
</html>
